let AC=null;
function startAudio(){
  if(AC)return;
  try{AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();startBGM();}catch(e){}
}
function tone(f,dur,type='square',vol=0.05,slideTo=null,t0=0){
  if(!AC)return;
  const o=AC.createOscillator(),gn=AC.createGain();
  const st=AC.currentTime+t0;
  o.type=type;o.frequency.setValueAtTime(f,st);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),st+dur);
  gn.gain.setValueAtTime(0,st);
  gn.gain.linearRampToValueAtTime(vol,st+0.008);
  gn.gain.exponentialRampToValueAtTime(0.0001,st+dur);
  o.connect(gn);gn.connect(AC.destination);
  o.start(st);o.stop(st+dur+0.02);
}
function noise(dur,vol=0.05,filter=2000,t0=0){
  if(!AC)return;
  const bs=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  bs.buffer=buf;
  const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=filter;
  const gn=AC.createGain();gn.gain.value=vol;
  bs.connect(f);f.connect(gn);gn.connect(AC.destination);
  bs.start(AC.currentTime+t0);
}

const MEL=[0,2,1,2, 0,1,2,1, 2,0,1,2, 1,2,0,1, 2,1,0,2, 1,0,2,1];
function voice(f,t,d,type,v,attack=0.02,release=0.1){
  const o=AC.createOscillator(),gn=AC.createGain();
  o.type=type;o.frequency.value=f;
  gn.gain.setValueAtTime(0,t);
  gn.gain.linearRampToValueAtTime(v,t+attack);
  gn.gain.linearRampToValueAtTime(v*0.7,t+d-release);
  gn.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(gn);gn.connect(AC.destination);
  o.start(t);o.stop(t+d+0.05);
}
function scheduleBGM(){
  if(!BGM.on||!AC)return;
  const now=AC.currentTime;
  while(BGM.tNext<now+2.5){
    const chordList=BGM.fast?BOSS_CHORDS:CHORDS;
    const c=chordList[BGM.bar%chordList.length];
    const bd=BGM.fast?1.9:2.4;
    c.p.forEach(f=>voice(f,BGM.tNext,bd,'triangle',BGM.fast?0.015:0.012,0.3,0.3));
    voice(c.r,BGM.tNext,bd*0.9,'sine',BGM.fast?0.035:0.028,0.05,0.2);
    voice(c.r*2,BGM.tNext+bd*0.5,bd*0.4,'sine',0.014,0.05,0.1);
    for(let i=0;i<8;i++){
      const mi=MEL[(BGM.bar*8+i)%MEL.length];
      const f=c.a[mi%3]*(mi>=3?2:1);
      voice(f,BGM.tNext+i*bd/8,bd/8*0.9,'sine',0.024,0.005,0.04);
    }
    if(BGM.fast){
      // Add tense bass pulse
      for(let i=0;i<4;i++)voice(c.r*0.5,BGM.tNext+i*bd/4,bd/4*0.4,'sawtooth',0.022,0.01,0.05);
    } else if(BGM.bar%4===2){
      for(let i=0;i<4;i++)voice(c.a[i%3]/2,BGM.tNext+i*bd/4,bd/4*0.7,'triangle',0.018,0.02,0.05);
    }
    BGM.tNext+=bd;BGM.bar++;
  }
  setTimeout(scheduleBGM,400);
}
function startBGM(){
  if(BGM.on||!AC)return;
  BGM.on=true;BGM.tNext=AC.currentTime+0.2;BGM.bar=0;scheduleBGM();
}

// ==================== HELPERS ====================
function px(x,y,c){g.fillStyle=c;g.fillRect(x|0,y|0,1,1);}
function rc(x,y,w,h,c){g.fillStyle=c;g.fillRect(x|0,y|0,w,h);}
function overlap(a,b){return a.x+a.w>b.x&&a.x<b.x+b.w&&a.y+a.h>b.y&&a.y<b.y+b.h;}

function physicsEntity(e,isPlayer){
  e.x+=e.vx;
  solidBlocks.forEach(b=>{
    if(overlap(e,b)){
      if(e.vx>0){e.x=b.x-e.w;}
      else if(e.vx<0){e.x=b.x+b.w;}
      if(!isPlayer)e.vx*=-1;else e.vx=0;
    }
  });
  if(e.x<0){e.x=0;if(isPlayer)e.vx=0;else e.vx=Math.abs(e.vx);}
  if(e.x+e.w>WORLD_W){e.x=WORLD_W-e.w;if(isPlayer)e.vx=0;else e.vx=-Math.abs(e.vx);}

  const prevY=e.y;
  e.y+=e.vy;
  let landed=false;
  solidBlocks.forEach(b=>{
    if(overlap(e,b)){
      if(e.vy>0){e.y=b.y-e.h;landed=true;}
      else if(e.vy<0){e.y=b.y+b.h;}
      e.vy=0;
    }
  });
  platforms.forEach(pl=>{
    if(e.vy>=0 &&
       e.x+e.w>pl.x+1 && e.x<pl.x+pl.w-1 &&
       prevY+e.h<=pl.y+2 && e.y+e.h>=pl.y){
      e.y=pl.y-e.h;e.vy=0;landed=true;
    }
  });
  if(e.y+e.h>=GY){e.y=GY-e.h;e.vy=0;landed=true;}
  e.onG=landed;
  if(landed && isPlayer){
    if(P.jumps>0 && P.vy===0 && P.landDust<=0){
      for(let i=0;i<4;i++)particles.push({x:P.x+camX+6+(Math.random()-0.5)*8,y:P.y+P.h,vx:(Math.random()-0.5)*1.5,vy:-Math.random()*0.8,life:12,c:'#d4b88a',sz:1});
      P.landDust=8;
    }
    P.jumps=0;P.spinTime=0;
    if(P.landDust>0)P.landDust--;
  }
}

// ==================== DRAW: BACKGROUND ====================
function drawBG(){
  const lg=g.createLinearGradient(0,0,0,GY);
  if(BGM.fast){
    lg.addColorStop(0,'#6a3a4a');lg.addColorStop(0.5,'#8a4a5a');lg.addColorStop(1,'#d4806a');
  } else {
    lg.addColorStop(0,'#87ceeb');lg.addColorStop(0.5,'#b0daee');lg.addColorStop(1,'#f5e6c8');
  }
  g.fillStyle=lg;g.fillRect(0,0,W,GY);
  // sun rays
  g.fillStyle='rgba(255,240,180,0.15)';
  for(let i=0;i<5;i++){
    g.beginPath();
    g.moveTo(W-80,30);
    g.lineTo(-20,150+i*15);
    g.lineTo(-20,180+i*15);
    g.closePath();g.fill();
  }
  // sun/moon
  g.fillStyle=BGM.fast?'#e8b048':'#fff9b0';
  g.beginPath();g.arc(W-70,40,16,0,Math.PI*2);g.fill();
  g.fillStyle=BGM.fast?'#d47020':'#ffe070';
  g.beginPath();g.arc(W-70,40,12,0,Math.PI*2);g.fill();
  // birds (sky)
  for(let i=0;i<4;i++){
    const bx=((i*230+t*0.3)-camX*0.15)%(W+100)-50;
    const by=40+Math.sin(t/30+i)*6+(i%2)*20;
    const wing=Math.floor(t/8+i)%2;
    if(bx>-10&&bx<W+10){
      g.strokeStyle='#333';g.lineWidth=1;
      g.beginPath();
      g.moveTo(bx-3,by+(wing?1:-1));
      g.lineTo(bx,by);
      g.lineTo(bx+3,by+(wing?1:-1));
      g.stroke();
    }
  }
  // distant mountains
  g.fillStyle='#8ab0c5';
  for(let i=0;i<10;i++){
    const mx=((i*200)-camX*0.15)%(W+200)-100;
    g.beginPath();g.moveTo(mx,GY);g.lineTo(mx+60,GY-75);g.lineTo(mx+120,GY);g.fill();
  }
  g.fillStyle='#e4f0f8';
  for(let i=0;i<10;i++){
    const mx=((i*200)-camX*0.15)%(W+200)-100;
    g.beginPath();g.moveTo(mx+50,GY-55);g.lineTo(mx+60,GY-75);g.lineTo(mx+70,GY-55);g.closePath();g.fill();
  }
  // distant castle silhouette (visible late)
  if(camX>1500){
    const cx=3000-camX*0.4;
    if(cx>-80&&cx<W){
      g.fillStyle='#4a4a5a';
      rc(cx,GY-90,60,90,'#4a4a5a');
      rc(cx-8,GY-70,8,70,'#4a4a5a');
      rc(cx+60,GY-70,8,70,'#4a4a5a');
      rc(cx+25,GY-110,10,20,'#4a4a5a');
      // towers top
      g.beginPath();g.moveTo(cx-10,GY-70);g.lineTo(cx-4,GY-80);g.lineTo(cx+2,GY-70);g.fill();
      g.beginPath();g.moveTo(cx+58,GY-70);g.lineTo(cx+64,GY-80);g.lineTo(cx+70,GY-70);g.fill();
      g.beginPath();g.moveTo(cx+22,GY-110);g.lineTo(cx+30,GY-122);g.lineTo(cx+38,GY-110);g.fill();
      // windows
      rc(cx+10,GY-50,4,6,'#ffb040');
      rc(cx+30,GY-50,4,6,'#ffb040');
      rc(cx+46,GY-50,4,6,'#ffb040');
    }
  }
  g.fillStyle='#6a8fa5';
  for(let i=0;i<8;i++){
    const mx=((i*200+100)-camX*0.22)%(W+200)-100;
    g.beginPath();g.moveTo(mx,GY);g.lineTo(mx+40,GY-50);g.lineTo(mx+80,GY);g.fill();
  }
  // hills mid
  g.fillStyle=BGM.fast?'#4a6a3a':'#6aaa5a';
  for(let i=0;i<10;i++){
    const mx=((i*160)-camX*0.45)%(W+160)-80;
    g.beginPath();g.moveTo(mx,GY);g.lineTo(mx+50,GY-40);g.lineTo(mx+100,GY);g.fill();
  }
  g.fillStyle=BGM.fast?'#5a7a4a':'#7abb6a';
  for(let i=0;i<10;i++){
    const mx=((i*160+80)-camX*0.5)%(W+160)-80;
    g.beginPath();g.moveTo(mx,GY);g.lineTo(mx+35,GY-25);g.lineTo(mx+70,GY);g.fill();
  }
  // clouds (multi-layer)
  g.fillStyle=BGM.fast?'rgba(180,120,120,0.9)':'#fff';
  for(let i=0;i<8;i++){
    const cx=((i*180)-camX*0.3)%(W+200)-100,cy=20+(i*13)%55;
    rc(cx,cy,22,6,g.fillStyle);
    rc(cx+5,cy-4,16,6,g.fillStyle);
    rc(cx+12,cy+2,12,4,g.fillStyle);
    rc(cx-3,cy+2,6,4,g.fillStyle);
    rc(cx+6,cy-3,5,1,'#e8f0f8');
  }
  // falling leaves / petals (ambient)
  for(let i=0;i<12;i++){
    const lx=((i*73)+t*0.5-camX*0.8)%(W+60)-30;
    const ly=((i*47)+t*1.2)%(GY+60)-20;
    const sw=Math.sin(t/15+i)*4;
    if(ly>0&&ly<GY){
      rc(lx+sw,ly,2,2,['#f8a070','#ffb080','#ffc080','#d8ffaa'][i%4]);
      px(lx+sw+1,ly+1,'#fff');
    }
  }
  // ground
  g.fillStyle='#8b5a2b';g.fillRect(0,GY,W,H-GY);
  g.fillStyle='#6a4020';for(let y=GY+6;y<H;y+=4)g.fillRect(0,y,W,1);
  g.fillStyle='#4a2810';for(let y=GY+10;y<H;y+=8)g.fillRect(0,y,W,1);
  g.fillStyle='#5a9a3a';g.fillRect(0,GY,W,5);
  g.fillStyle='#7abb4a';g.fillRect(0,GY,W,1);
  // grass animation - wave
  for(let i=0;i<60;i++){
    const gx=((i*34)-camX)%(W+50)-25;
    const wave=Math.sin(t/20+i*0.3)*1;
    if(gx>-5&&gx<W+5){
      rc(gx+wave,GY-1,1,2,'#3a7a1a');
      rc(gx+2+wave,GY-1,1,3,'#3a7a1a');
      rc(gx-1+wave,GY-1,1,2,'#4a8a2a');
      if(i%5===0){px(gx+1+wave,GY-3,'#ff88aa');px(gx+1+wave,GY-4,'#ffdd00');}
      if(i%7===0){px(gx-1+wave,GY-2,'#ffffff');px(gx+wave,GY-3,'#ffffff');}
      if(i%11===0){rc(gx+wave,GY-5,1,2,'#ff6688');px(gx-1+wave,GY-4,'#ff6688');px(gx+1+wave,GY-4,'#ff6688');px(gx+wave,GY-6,'#ffdd00');}
      if(i%13===0){rc(gx+wave,GY-4,1,3,'#aa66ff');px(gx-1+wave,GY-3,'#aa66ff');px(gx+1+wave,GY-3,'#aa66ff');}
      // mushrooms
      if(i%19===0){
        rc(gx+wave-1,GY-4,4,2,'#e22');rc(gx+wave,GY-2,2,2,'#f8e4c0');
        px(gx+wave,GY-4,'#fff');px(gx+wave+2,GY-3,'#fff');
      }
    }
  }
  // bushes (foreground)
  for(let i=0;i<15;i++){
    const bx=((i*260+150)-camX*0.98)%(W+260)-130;
    if(bx>-20&&bx<W+20){
      rc(bx,GY-6,14,6,'#3d7a3d');
      rc(bx-2,GY-4,4,4,'#4d8a4d');
      rc(bx+12,GY-4,4,4,'#4d8a4d');
      rc(bx+2,GY-8,4,4,'#4d8a4d');
      rc(bx+8,GY-9,4,5,'#4d8a4d');
      px(bx+4,GY-7,'#6aaa5a');
      px(bx+10,GY-8,'#6aaa5a');
      if(i%3===0){px(bx+6,GY-5,'#ffffff');px(bx+10,GY-6,'#ffdd00');}
    }
  }
  // butterflies
  for(let i=0;i<5;i++){
    const butX=((i*430)-camX*0.9)%(W+100)-50;
    const butY=GY-25+Math.sin(t/15+i)*15;
    const wing=Math.floor(t/4+i)%2;
    if(butX>-5&&butX<W+5){
      const col=['#ffaadd','#aaddff','#ffddaa','#ddaaff'][i%4];
      if(wing){rc(butX-2,butY,2,2,col);rc(butX+2,butY,2,2,col);}
      else{rc(butX-1,butY-1,1,3,col);rc(butX+2,butY-1,1,3,col);}
      px(butX,butY,'#000');px(butX+1,butY,'#000');
    }
  }
  // trees - varied types
  for(let i=0;i<24;i++){
    const tx=((i*170+80)-camX*0.95)%(W+200)-100;
    if(tx>-40&&tx<W+40){
      const type=i%3;
      if(type===0){ // oak
        rc(tx,GY-22,4,22,'#5a3a1a');
        rc(tx+1,GY-22,1,22,'#8a5a2a');
        rc(tx-7,GY-38,18,20,'#3d7a3d');
        rc(tx-5,GY-42,14,8,'#5a9a5a');
        rc(tx-3,GY-45,10,4,'#6abb6a');
        if(i%3===0){px(tx-4,GY-32,'#e33');px(tx+8,GY-30,'#e33');}
        if(i%4===0){px(tx-6,GY-28,'#ffd93d');}
      } else if(type===1){ // pine
        rc(tx,GY-18,3,18,'#6a3a1a');
        g.fillStyle='#2d6b2d';
        g.beginPath();g.moveTo(tx-8,GY-20);g.lineTo(tx+1,GY-40);g.lineTo(tx+10,GY-20);g.closePath();g.fill();
        g.fillStyle='#3d8b3d';
        g.beginPath();g.moveTo(tx-6,GY-28);g.lineTo(tx+1,GY-45);g.lineTo(tx+8,GY-28);g.closePath();g.fill();
        g.fillStyle='#4d9b4d';
        g.beginPath();g.moveTo(tx-4,GY-36);g.lineTo(tx+1,GY-48);g.lineTo(tx+6,GY-36);g.closePath();g.fill();
      } else { // cherry blossom
        rc(tx,GY-20,4,20,'#5a3a1a');
        rc(tx-6,GY-36,16,16,'#f8b0c8');
        rc(tx-4,GY-40,12,6,'#ffc0d8');
        rc(tx-2,GY-42,8,4,'#ffd0e0');
        px(tx-2,GY-30,'#fff');px(tx+5,GY-28,'#fff');px(tx+2,GY-34,'#fff');

  // solid blocks
  solidBlocks.forEach(b=>{
    const bx=b.x-camX;

      rc(bx,b.y,b.w,b.h,'#8b5a2b');
      rc(bx,b.y,b.w,2,'#5a9a3a');
      rc(bx,b.y+2,b.w,1,'#7abb4a');
      if(b.h<=20){
        for(let ix=0;ix<b.w;ix+=8)rc(bx+ix,b.y+4,1,b.h-4,'#6a4020');
        for(let iy=b.y+8;iy<b.y+b.h;iy+=6)rc(bx,iy,b.w,1,'#6a4020');
      } else {
        for(let p=0;p<b.w*b.h/30;p++){
          const rx=bx+(p*7)%b.w,ry=b.y+3+(p*11)%(b.h-3);
          px(rx,ry,'#6a4020');
        }
        // stone highlights
        for(let p=0;p<b.w/8;p++){
          const rx=bx+p*8+3,ry=b.y+5+p*3;
          if(ry<b.y+b.h-2)px(rx,ry,'#a07040');

      rc(bx,b.y+b.h-1,b.w,1,'#4a2810');
    }

  // platforms (wooden)
  platforms.forEach(pl=>{
    const bx=pl.x-camX;
    if(bx>-pl.w && bx<W){
      rc(bx,pl.y,pl.w,pl.h,'#a0703a');
      rc(bx,pl.y,pl.w,1,'#d4a060');
      rc(bx,pl.y+pl.h-1,pl.w,1,'#6a4020');
      for(let ix=0;ix<pl.w;ix+=12)rc(bx+ix,pl.y,1,pl.h,'#6a4020');
      // little rope holding it up (aesthetic)
      if(pl.y<GY-30){
        rc(bx+pl.w/2-1,pl.y-3,1,3,'#6a4020');
        rc(bx+pl.w/2+1,pl.y-3,1,3,'#6a4020');
      }
    }
  });
}

// ==================== UPDATE ====================
function update(){
  t++;
  if(camShake>0)camShake--;
  if(flash>0)flash--;
  if(dangerT>0)dangerT--;

  if(scene==='opening'){
    if(K['enter']||K[' ']){scene='playing';buildLevel();tone(660,0.1,'triangle',0.06);}
    for(const k in KP)KP[k]=0;
    return;
  }
  if(scene==='clear'||scene==='over'){
    if(K['enter'])location.reload();
    for(const k in KP)KP[k]=0;
    return;
  }

  if(P.alive){
    const spd=1.8;
    if(!P.dashing){
      if(K['arrowleft']||K['a']){P.vx=-spd;P.face=-1;}
      else if(K['arrowright']||K['d']){P.vx=spd;P.face=1;}
      else P.vx*=0.7;
    }
    // Double jump (Z only - prevents arrow diagonal bug)
    if(KP['z']&&P.jumps<2&&P.jumpCD<=0){
      if(P.jumps===0){P.vy=-5.9;P.jumps=1;P.jumpCD=10;sfxJump();}
      else{P.vy=-4.4;P.jumps=2;P.jumpCD=10;P.spinTime=24;sfxDJump();
        for(let i=0;i<6;i++)particles.push({x:P.x+camX+6+(Math.random()-0.5)*4,y:P.y+P.h,vx:(Math.random()-0.5)*2,vy:Math.random()*2,life:15,c:'#fff',sz:1});}
    }
    if(P.jumpCD>0)P.jumpCD--;
    if(P.spinTime>0)P.spinTime--;

    if(KP['1'])P.weapon=0;if(KP['2'])P.weapon=1;if(KP['3'])P.weapon=2;if(KP['4'])P.weapon=3;

    // SHIELD DASH
    if(P.weapon===2 && KP['c'] && P.dashCD<=0 && !P.dashing){
      P.dashing=16;P.dashCD=50;P.iframe=22;
      sfxDash();camShake=4;
      enemies.forEach(e=>e.dashHit=0);
    }
    if(P.dashing>0){
      P.dashing--;
      P.vx=P.face*12; // 12*16=192px=4칸
      // afterimage
      if(P.dashing%2===0)afterImages.push({x:P.x,y:P.y,face:P.face,life:8});
      // damage enemies
      enemies.forEach(e=>{
        if(!e.dead && !e.dashHit && overlap(P,e)){
          e.hp-=DMG.dash;e.hit=14;e.flee=50;e.dashHit=1;
          e.vx=P.face*5;e.vy=-3;
          for(let i=0;i<8;i++)particles.push({x:e.x+camX+e.w/2,y:e.y+e.h/2,vx:P.face*2+Math.random()*2,vy:-Math.random()*3,life:20,c:'#ffd93d',sz:2});
          sfxHit();camShake=5;
        }
      });
    }
    if(P.dashCD>0)P.dashCD--;

    if(K['x']&&P.atk<=0&&!P.dashing){
      if(P.weapon===0 && P.throwCD<=0){
        // Doll: straight throw, 7칸=336px, disappears on hit
        projectiles.push({x:P.x+6,y:P.y+10,vx:P.face*5,vy:0,type:'doll',life:120,range:7*TILE,dmg:DMG.doll});
        P.throwCD=35;P.atk=10;P.atkType=0;
        sfxDoll();
      } else if(P.weapon===1){
        P.atk=14;P.atkType=1;
        sfxSword();camShake=4;
      } else if(P.weapon===3 && P.shootCD<=0){
        // Water: longer range
        projectiles.push({x:P.x+6,y:P.y+12,vx:P.face*5,vy:0,type:'water',life:120,range:9*TILE,dmg:DMG.water});
        P.shootCD=8;P.atk=6;P.atkType=3;
        sfxWater();
      }
    }

    // Mom summon
    if(KP['b']&&P.bombs>0&&!mom){
      P.bombs--;momCount++;
      mom={x:camX-40,y:GY-28,vx:3.5,hits:new Set()};
      sfxMom();flash=15;camShake=8;
    }
    if(P.bombCD>0)P.bombCD--;
    if(P.throwCD>0)P.throwCD--;
    if(P.shootCD>0)P.shootCD--;
    if(P.atk>0)P.atk--;
    if(P.iframe>0)P.iframe--;

    P.vy+=0.3;if(P.vy>8)P.vy=8;
    physicsEntity(P,1);

    const target=P.x-W/3;
    camX+=(target-camX)*0.12;
    if(camX<0)camX=0;
    if(camX>WORLD_W-W)camX=WORLD_W-W;
  }

  // afterimage update
  afterImages.forEach(a=>a.life--);
  afterImages=afterImages.filter(a=>a.life>0);

  // Sword hit
  if(P.atk>0 && P.atkType===1){
    const hx=P.face>0?P.x+8:P.x-18,hy=P.y,hw=22,hh=22;
    enemies.forEach(e=>{
      if(!e.dead&&!e.hitByThis&&e.x+e.w>hx&&e.x<hx+hw&&e.y+e.h>hy&&e.y<hy+hh){
        e.hp-=DMG.sword;e.hit=10;e.hitByThis=1;
        e.vx=P.face*3;e.vy=-2;e.flee=50;
        sfxHit();camShake=3;
        for(let i=0;i<5;i++)particles.push({x:e.x+camX+e.w/2,y:e.y+e.h/2,vx:P.face*2+Math.random(),vy:-Math.random()*2.5,life:18,c:'#fff',sz:2});
      }
    });
  } else {
    enemies.forEach(e=>e.hitByThis=0);
  }

  // Mom
  if(mom){
    mom.x+=mom.vx;
    enemies.forEach(e=>{
      if(!e.dead && !mom.hits.has(e) && Math.abs((e.x+e.w/2)-(mom.x+7))<20 && Math.abs(e.y+e.h/2-mom.y-15)<32){
        e.hp-=MOM_DMG;e.hit=16;mom.hits.add(e);
        e.vx=4;e.vy=-4;e.flee=60;
        camShake=6;
        for(let i=0;i<10;i++)particles.push({x:e.x+camX+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.2)*5,vy:-Math.random()*4,life:25,c:['#ffd93d','#fff','#ea6b8a'][i%3],sz:2});
        sfxHit();
      }
    });
    if(mom.x>camX+W+50)mom=null;
  }

  // Projectiles
  projectiles.forEach(pr=>{
    if(pr.type==='doll'){
      pr.x+=pr.vx;
      pr.range-=Math.abs(pr.vx);
      if(pr.range<=0)pr.life=0;
    } else if(pr.type==='water'){
      pr.x+=pr.vx;pr.range-=Math.abs(pr.vx);
      if(pr.range<=0)pr.life=0;
    } else if(pr.type==='beam'){
      pr.x+=pr.vx;pr.y+=pr.vy;pr.vy+=0.12;
    } else if(pr.type==='bolt'){
      // pikachu electric - straight, short range
      pr.x+=pr.vx;pr.range-=Math.abs(pr.vx);
      if(pr.range<=0)pr.life=0;
      // trail spark
      if(t%2===0)particles.push({x:pr.x+camX+(Math.random()-0.5)*4,y:pr.y+(Math.random()-0.5)*4,vx:0,vy:0,life:8,c:'#ffff00',sz:1});
    } else if(pr.type==='ewater'){
      // squirtle water
      pr.x+=pr.vx;pr.range-=Math.abs(pr.vx);
      if(pr.range<=0)pr.life=0;
      if(t%2===0)particles.push({x:pr.x+camX,y:pr.y+(Math.random()-0.5)*2,vx:-pr.vx*0.2,vy:0,life:8,c:'#4fc3f7',sz:1});
    } else if(pr.type==='shard'){
      pr.x+=pr.vx;pr.y+=pr.vy;pr.vy+=0.22;
      if(t%2===0)particles.push({x:pr.x+camX+2,y:pr.y+2,vx:0,vy:0,life:12,c:'#8a3dd4',sz:2});
      if(pr.y>=GY-3){
        for(let i=0;i<10;i++)particles.push({x:pr.x+camX,y:GY-2,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:20,c:['#8a3dd4','#aa5df0','#fff'][i%3],sz:2});
        sfxExplode();camShake=5;
        if(P.iframe<=0 && Math.abs(P.x+P.w/2-pr.x)<22 && P.y>GY-30){
          if(!(P.block && ((P.face>0&&pr.vx<0)||(P.face<0&&pr.vx>0)))){
            P.hp--;P.iframe=55;sfxHurt();
            P.vx=(P.x+P.w/2<pr.x?-3:3);P.vy=-3;
          }
        }
        pr.life=0;
      }
    } else if(pr.type==='missile'){
      pr.vy+=0.3;pr.y+=pr.vy;
      if(t%2===0)particles.push({x:pr.x+camX,y:pr.y+6,vx:0,vy:0,life:10,c:'#ffd93d',sz:2});
      if(pr.y>=GY-4){
        for(let i=0;i<20;i++)particles.push({x:pr.x+camX,y:GY-2,vx:(Math.random()-0.5)*6,vy:-Math.random()*4,life:25,c:['#ff4050','#ffd93d','#fff'][i%3],sz:2});
        sfxExplode();camShake=12;
        if(P.iframe<=0 && Math.abs(P.x+P.w/2-pr.x)<30 && P.y>GY-40){
          P.hp-=2;P.iframe=60;sfxHurt();
          P.vx=(P.x+P.w/2<pr.x?-3:3);P.vy=-3;
        }
        pr.life=0;
      }
    }
    pr.life--;
    // Player attacks hit enemy
    enemies.forEach(e=>{
      if(!e.dead&&pr.life>0&&!pr.owner&&pr.x>e.x&&pr.x<e.x+e.w&&pr.y>e.y&&pr.y<e.y+e.h){
        e.hp-=pr.dmg||1;e.hit=10;e.flee=45;
        if(!e.boss){e.vx=Math.sign(pr.vx||P.face)*2.5;e.vy=-1.5;}
        pr.life=0; // always disappears on hit now
        sfxHit();
        for(let i=0;i<3;i++)particles.push({x:e.x+camX+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,life:15,c:'#fff',sz:1});
      }
    });
    // Enemy projectile hits player
    if(pr.owner && P.iframe<=0 && pr.x>P.x && pr.x<P.x+P.w && pr.y>P.y && pr.y<P.y+P.h){
      if(!(P.weapon===2 && P.dashing)){
        P.hp-=pr.dmg||1;P.iframe=60;sfxHurt();camShake=5;
      }
      pr.life=0;
    }
  });
  projectiles=projectiles.filter(p=>p.life>0);

  // warnings
  warnings.forEach(w=>{
    w.life--;
    if(w.life===60)sfxMissileWarn();
    if(w.life<=0 && !w.fired){
      projectiles.push({x:w.x,y:GY-200,vx:0,vy:3,type:'missile',life:80,owner:1,dmg:2});
      sfxMissileFire();
      w.fired=1;
    }
  });
  warnings=warnings.filter(w=>!w.fired);

  // Enemies
  enemies.forEach(e=>{
    if(e.dead){e.y+=3;return;}
    if(e.hit)e.hit--;
    if(e.flee)e.flee--;

    if(e.boss){
      updateBoss(e);
    } else {
      // type-specific ranged attacks (pikachu=0, squirtle=2)
      if(e.type===0 || e.type===2){
        if(e.charging>0){
          e.charging--;
          e.vx=0;
          // fire at specific frame
          const fireAt=e.type===0?40:35;
          if(e.charging===fireAt){
            if(e.type===0){
              // electric bolt 3칸=144px
              projectiles.push({x:e.x+e.w/2,y:e.y+8,vx:e.attackFace*4.5,vy:0,type:'bolt',life:60,range:3*TILE,owner:1,dmg:1});
              sfxElectric();
              for(let i=0;i<6;i++)particles.push({x:e.x+camX+e.w/2,y:e.y+8,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,life:15,c:'#ffff00',sz:2});
            } else {
              // water cannon 3칸
              projectiles.push({x:e.x+e.w/2,y:e.y+6,vx:e.attackFace*4.2,vy:0,type:'ewater',life:60,range:3*TILE,owner:1,dmg:1});
              sfxEWater();
              for(let i=0;i<5;i++)particles.push({x:e.x+camX+e.w/2,y:e.y+6,vx:e.attackFace*2+(Math.random()-0.5)*2,vy:-Math.random(),life:15,c:'#4fc3f7',sz:2});
            }
          }
        } else {
          e.attackT--;
          if(e.attackT<=0 && Math.abs(e.x+e.w/2-P.x-P.w/2)<220 && Math.abs(e.x+e.w/2-P.x-P.w/2)>20){
            e.charging=55;
            e.attackT=210+Math.random()*60;
            e.attackFace=P.x<e.x?-1:1;
            e.vx=0;
          }
        }
      }
      // Movement
      if(e.charging<=0){
        if(e.flee>0){
          const away=e.x<P.x?-1:1;
          e.vx=away*Math.max(e.baseSpd*1.5,Math.abs(e.vx));
        } else {
          e.wanderT--;
          if(e.wanderT<=0){
            const toP=P.x<e.x?-1:1;
            e.vx=toP*e.baseSpd*(0.8+Math.random()*0.6);
            e.wanderT=60+Math.random()*60;
          }
          if(Math.abs(e.vx)<0.1){
            e.vx=(Math.random()<0.5?-1:1)*e.baseSpd;
          }
        }
      }
      e.vy+=0.3;if(e.vy>7)e.vy=7;
      physicsEntity(e,0);
      if(e.onG){
        const fx=e.x+(e.vx<0?-2:e.w+2);
        let hasGround=(GY-e.y-e.h<4);
        solidBlocks.forEach(b=>{if(fx>b.x&&fx<b.x+b.w&&Math.abs(e.y+e.h-b.y)<4)hasGround=true;});
        platforms.forEach(pl=>{if(fx>pl.x&&fx<pl.x+pl.w&&Math.abs(e.y+e.h-pl.y)<4)hasGround=true;});
        if(!hasGround)e.vx*=-1;
      }
    }

    if(P.iframe<=0 && P.alive && overlap(e,P)){
      if(P.dashing>0){
        // dashing plows through; already handled damage above
      } else {
        P.hp-=e.atk;P.iframe=55;
        const dx=P.x-e.x;
        const pushDir=dx<0?-1:1;
        P.vx=pushDir*3;P.vy=-2.5;
        e.vx=-pushDir*1.5;e.vy=-1;
        sfxHurt();camShake=6;
      }
    }
    if(e.hp<=0 && !e.dead){
      e.dead=1;
      P.exp+=e.boss?25:1;
      sfxDeath();camShake=e.boss?20:4;
      for(let i=0;i<(e.boss?50:12);i++)particles.push({x:e.x+camX+e.w/2,y:e.y+e.h/2,vx:(Math.random()-.5)*(e.boss?7:3),vy:-Math.random()*(e.boss?5:2.5),life:30,c:['#ffd93d','#f55','#3d8b3d','#88c4ff','#6a2a9a','#fff'][e.type%6],sz:e.boss?3:2});
      if(e.boss){BGM.fast=0;setTimeout(()=>scene='clear',1400);}
    }
  });

  // Pickups
  pickups.forEach(pk=>{
    if(!pk.got && Math.abs(pk.x+4-P.x-6)<12 && Math.abs(pk.y-P.y)<22){
      pk.got=1;
      if(pk.type==='heart' && P.hp<P.maxhp)P.hp++;
      else if(pk.type==='heart'){P.maxhp++;P.hp=P.maxhp;}
      if(pk.type==='bomb' && P.bombs<P.maxbombs)P.bombs++;
      else if(pk.type==='bomb'){P.maxbombs++;P.bombs++;}
      sfxPickup();
      for(let i=0;i<8;i++)particles.push({x:pk.x+camX+4,y:pk.y+4,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:20,c:pk.type==='heart'?'#f55':'#ea6b8a',sz:2});
    }
  });
  pickups=pickups.filter(p=>!p.got);

  if(P.exp>=P.need){
    P.exp-=P.need;P.lv++;P.need+=3;
    P.maxhp++;P.hp=P.maxhp;sfxLvl();
  }

  if(P.hp<=0 && P.alive){P.alive=0;setTimeout(()=>scene='over',900);sfxHurt();camShake=15;}

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;});
  particles=particles.filter(p=>p.life>0);

  for(const k in KP)KP[k]=0;
}

// ==================== BOSS AI ====================
function updateBoss(e){
  if(e.state==='wait'){
    if(P.x>e.x-280 && !e.aggro){
      e.aggro=1;e.state='warning';e.stateT=150;
      dangerT=150;
      sfxWarning();
      setTimeout(()=>sfxWarning(),450);
      BGM.fast=1;
      camShake=10;
    }
    e.vx=0;e.vy=0;
    return;
  }
  if(e.state==='warning'){
    e.stateT--;
    if(e.stateT<=0){
      e.state='entry';e.stateT=120;e.entryT=0;
      sfxSteam();sfxBossRoar();camShake=20;flash=30;
    }
    return;
  }
  if(e.state==='entry'){
    e.entryT++;
    if(e.entryT%2===0){
      for(let i=0;i<3;i++){
        particles.push({x:e.x+camX+Math.random()*e.w,y:e.y+e.h-Math.random()*10,vx:(Math.random()-0.5)*2,vy:-Math.random()*2-1,life:40,c:'#e8e8e8',sz:3});
      }
    }
    if(e.entryT%20===0)sfxSteam();
    e.stateT--;
    if(e.stateT<=0){
      e.state='idle';e.stateT=60;
      sfxBossRoar();
    }
    return;
  }
  e.stateT--;
  if(e.state==='idle'){
    if(e.stateT%40===0){
      e.vx=(Math.random()-0.5)*2.2;
    }
    if(!e.onG){e.vy+=0.3;}
    physicsEntity(e,0);
    if(e.x<camX+20){e.vx=Math.abs(e.vx);}
    if(e.x+e.w>camX+W-20){e.vx=-Math.abs(e.vx);}
    if(e.stateT<=0){
      const r=Math.random();
      if(r<0.3){e.state='jump';e.stateT=130;e.vy=-7;e.vx=(P.x>e.x?1:-1)*2.2;}
      else if(r<0.6){e.state='missiles';e.stateT=220;e.missilesFired=0;e.vx=0;}
      else if(r<0.9){e.state='shards';e.stateT=130;e.vx=0;e.shardsFired=0;}
      else{e.state='idle';e.stateT=60;}
    }
  } else if(e.state==='jump'){
    e.vy+=0.18;
    if(e.vy>0 && e.vy<2.5)e.vy=Math.max(e.vy-0.06,0.5);
    physicsEntity(e,0);
    if(e.onG){
      camShake=12;
      for(let i=0;i<14;i++)particles.push({x:e.x+camX+e.w/2+(Math.random()-0.5)*e.w,y:GY-2,vx:(Math.random()-0.5)*4,vy:-Math.random()*2.5,life:22,c:'#d4b88a',sz:2});
      e.state='idle';e.stateT=45;e.vx=0;
    }
  } else if(e.state==='missiles'){
    if(e.missilesFired<4 && e.stateT>100 && e.stateT%25===0){
      const mx=camX+60+Math.random()*(W-120);
      warnings.push({x:mx,y:GY,life:120});
      e.missilesFired++;
    }
    if(e.stateT<=0){
      e.state='idle';e.stateT=80;
    }
  } else if(e.state==='shards'){
    // fire 3 arcing shards
    if(e.stateT===80 && !e.shardsFired){
      const dir=P.x<e.x?-1:1;
      for(let i=0;i<3;i++){
        projectiles.push({
          x:e.x+e.w/2,y:e.y+20,
          vx:dir*(2.2+i*0.9),
          vy:-4.8-i*0.3,
          type:'shard',life:220,owner:1,dmg:1
        });
      }
      sfxShards();
      e.shardsFired=1;
    }
    if(e.stateT<=0){
      e.state='idle';e.stateT=60;
    }
  }
}

// ==================== RENDER ====================

    g.save();
    g.translate((Math.random()-0.5)*camShake,(Math.random()-0.5)*camShake);
  }

  if(scene==='opening'){
    g.fillStyle='#1a1a3a';g.fillRect(0,0,W,H);
    for(let i=0;i<60;i++){
      const sx=(i*37+t*0.3)%W,sy=(i*53)%150;
      px(sx,sy,i%3?'#fff':'#ff8');
      if(i%7===0 && Math.floor(t/20+i)%4===0)px(sx+1,sy,'#fff');
    }
    g.fillStyle='#f8f0d0';g.beginPath();g.arc(W-70,50,18,0,Math.PI*2);g.fill();

    g.beginPath();g.arc(W-62,55,3,0,Math.PI*2);g.fill();
    g.fillStyle='#000';g.font='bold 44px Malgun Gothic';g.textAlign='center';
    g.fillText('서로용사',W/2+2,82);

    g.fillStyle='#fff';g.font='13px Malgun Gothic';
    g.fillText('- 음식 대모험 Chapter 1 -',W/2,104);
    drawSeroTitle(W/2-12,125);
    g.fillStyle='#fff';g.font='11px Malgun Gothic';
    g.fillText('방향키: 이동 / Z: 점프(공중에서 한번 더 = 2단점프)',W/2,200);
    g.fillText('X: 공격  C: 방패대쉬  B: 엄마소환',W/2,216);
    g.fillText('1:인형  2:칼  3:방패  4:물총',W/2,232);
    g.fillStyle=(t%60<30)?'#ffd93d':'#aaa';g.font='bold 14px Malgun Gothic';
    g.fillText('[ENTER] 시작',W/2,256);
    if(camShake>0)g.restore();
    return;
  }

  drawBG();

  // warnings on ground
  warnings.forEach(w=>{
    const x=w.x-camX;
    const blink=Math.floor(t/3)%2;
    g.fillStyle=blink?'rgba(255,50,50,0.9)':'rgba(180,0,0,0.6)';
    g.beginPath();g.ellipse(x,GY-1,14,4,0,0,Math.PI*2);g.fill();
    if(blink){
      g.strokeStyle='#ff4050';g.lineWidth=1;
      g.beginPath();g.ellipse(x,GY-1,16,5,0,0,Math.PI*2);g.stroke();
    }
    rc(x-1,GY-14,2,10,blink?'#ff4050':'#aa2030');
    rc(x-3,GY-16,6,2,blink?'#ff4050':'#aa2030');
  });

  // pickups
  pickups.forEach(pk=>{
    const x=pk.x-camX,y=pk.y+Math.sin(t/8+pk.x)*2;
    if(pk.type==='heart'){
      rc(x+1,y,2,2,'#f33');rc(x+4,y,2,2,'#f33');rc(x,y+2,7,3,'#f33');rc(x+1,y+5,5,1,'#f33');rc(x+2,y+6,3,1,'#f33');rc(x+3,y+7,1,1,'#f33');
      rc(x+1,y+1,1,1,'#f99');
      if(Math.floor(t/10)%4===0){px(x-2,y,'#fff');px(x+8,y+2,'#fff');}
    } else {
      rc(x+2,y-1,4,2,'#3d2817');
      rc(x,y,8,7,'#ea6b8a');
      rc(x+1,y+1,6,3,'#fff');
      px(x+2,y+2,'#111');px(x+5,y+2,'#111');
      rc(x+3,y+5,3,1,'#c22');
      if(Math.floor(t/10)%4===0){px(x-2,y,'#ff8');px(x+8,y,'#ff8');}
    }
  });

  enemies.forEach(e=>{if(!e.dead||e.y<GY+50)drawEnemy(e);});

  // projectiles
  projectiles.forEach(pr=>{
    const x=pr.x-camX,y=pr.y;
    if(pr.type==='doll'){
      g.save();g.translate(x,y);g.rotate(t*0.5);
      drawDoll(-6,-7);
      g.restore();
    } else if(pr.type==='water'){
      rc(x,y,5,3,'#4fc3f7');rc(x-3,y,3,3,'#81d4fa');
      rc(x-5,y+1,2,1,'#b3e5fc');
      px(x+3,y-1,'#fff');px(x+4,y+3,'#b3e5fc');
      if(t%2===0)particles.push({x:pr.x+camX-Math.sign(pr.vx)*3,y:pr.y+(Math.random()-0.5)*2,vx:-pr.vx*0.2,vy:(Math.random()-0.5)*1,life:8,c:'#b3e5fc',sz:1});
    } else if(pr.type==='bolt'){
      // zigzag electric
      const zig=Math.floor(t/2)%2?1:-1;
      rc(x-3,y+zig,7,1,'#ffff00');
      rc(x-2,y-zig,6,1,'#fff');
      rc(x,y,4,2,'#ffff66');
      for(let i=0;i<3;i++)px(x+i*2,y+((i%2)?1:-1)*zig,'#fff');
    } else if(pr.type==='ewater'){
      rc(x-3,y,7,4,'#4fc3f7');
      rc(x-4,y+1,9,2,'#81d4fa');
      rc(x-5,y+1,1,2,'#b3e5fc');
      px(x-1,y-1,'#fff');px(x+2,y+4,'#b3e5fc');
    } else if(pr.type==='shard'){
      g.fillStyle='#8a3dd4';
      g.beginPath();g.arc(x+2,y+2,4,0,Math.PI*2);g.fill();
      g.fillStyle='#aa5df0';
      g.beginPath();g.arc(x+2,y+2,3,0,Math.PI*2);g.fill();
      px(x+1,y+1,'#fff');px(x+2,y,'#fff');
    } else if(pr.type==='beam'){
      rc(x,y,4,4,'#8a3dd4');rc(x+1,y+1,2,2,'#aa5df0');
      px(x+2,y+2,'#fff');
    } else if(pr.type==='missile'){
      rc(x-2,y,4,10,'#888');
      rc(x-2,y,4,2,'#c02030');
      rc(x-3,y+4,1,3,'#888');rc(x+2,y+4,1,3,'#888');
      const f=Math.floor(t/2)%2;
      rc(x-1,y-3-f,2,3,'#ffd93d');
      rc(x-1,y-5-f,2,2,'#ff8833');
      px(x,y-6-f,'#fff');
    }
  });

  particles.forEach(p=>{rc(p.x-camX,p.y,p.sz||2,p.sz||2,p.c);});

  // afterimages
  afterImages.forEach(a=>{
    g.globalAlpha=a.life/10;
    drawSeroBody(a.x-camX,a.y,0,a.face);
    g.globalAlpha=1;
  });

  if(P.alive && (P.iframe<=0||t%4<2)){
    drawSero(P.x-camX,P.y,Math.abs(P.vx)>0.3 && P.onG,P.face,P.spinTime);
  }

  drawMom();

  if(flash>0){g.fillStyle='rgba(255,255,255,'+(flash/30)+')';g.fillRect(0,0,W,H);}
  if(camShake>0)g.restore();

  // DANGER overlay (not shaken)
  if(dangerT>0){
    const cycle=Math.floor((150-dangerT)/38)%2;
    const sub=(150-dangerT)%38;
    if(sub<22){
      // red flash
      g.fillStyle='rgba(180,0,0,'+(0.4-sub/60)+')';
      g.fillRect(0,0,W,H);
      // DANGER text
      g.fillStyle='#000';g.font='bold 52px Impact,Arial';g.textAlign='center';
      g.fillText('DANGER',W/2+3,H/2+3);
      g.fillStyle='#ff2020';g.fillText('DANGER',W/2,H/2);
      g.strokeStyle='#fff';g.lineWidth=2;g.strokeText('DANGER',W/2,H/2);
      // warning triangles
      g.fillStyle='#ff0';
      g.font='bold 28px Arial';
      g.fillText('⚠  ⚠',W/2,H/2-38);
      g.fillText('⚠  ⚠',W/2,H/2+40);
    }
  }

  // HUD
  g.fillStyle='rgba(0,0,0,0.4)';g.fillRect(0,0,145,55);
  for(let i=0;i<P.maxhp;i++){
    const hx=6+i*11,hy=6;
    const c=i<P.hp?'#f33':'#511';
    rc(hx+1,hy,3,2,c);rc(hx+5,hy,3,2,c);rc(hx,hy+2,9,4,c);rc(hx+1,hy+6,7,1,c);rc(hx+2,hy+7,5,1,c);rc(hx+3,hy+8,3,1,c);rc(hx+4,hy+9,1,1,c);
    if(i<P.hp)px(hx+1,hy+1,'#f99');
  }
  rc(6,20,7,6,'#ea6b8a');rc(7,21,5,1,'#fff');px(7,22,'#111');px(10,22,'#111');
  g.fillStyle='#fff';g.font='bold 10px monospace';g.textAlign='left';
  g.fillText('엄마 x '+P.bombs+'/'+P.maxbombs,16,27);
  g.fillStyle='#ffd93d';g.fillText('Lv.'+P.lv,6,40);
  g.fillStyle='#fff';g.font='9px monospace';
  g.fillText('EXP '+P.exp+'/'+P.need,32,40);
  rc(6,44,130,3,'#333');rc(6,44,130*(P.exp/P.need),3,'#4fc3f7');
  g.fillStyle='#ffd93d';g.font='bold 11px Malgun Gothic';g.textAlign='left';
  g.fillText('◆ '+WN[P.weapon],6,58);
  if(P.weapon===2 && P.dashCD>0){
    rc(60,54,50,3,'#444');rc(60,54,50*(1-P.dashCD/50),3,'#ffd93d');
    g.fillStyle='#ccc';g.font='8px monospace';g.fillText('대쉬',60,52);
  }

  for(let i=0;i<4;i++){
    const bx=W-4-(4-i)*28,by=H-28;
    rc(bx-2,by-2,28,24,'rgba(0,0,0,0.5)');
    rc(bx,by,24,20,i===P.weapon?'#ffd93d':'#2a2a3a');
    rc(bx+1,by+1,22,18,'#1a1a2a');
    g.fillStyle=i===P.weapon?'#ffd93d':'#999';
    g.font='bold 9px Malgun Gothic';g.textAlign='center';
    g.fillText((i+1),bx+12,by+9);
    g.fillText(WN[i],bx+12,by+18);
  }
  const boss=enemies.find(e=>e.boss&&!e.dead);
  if(boss && boss.aggro && boss.state!=='wait' && boss.state!=='warning'){
    rc(W/2-110,16,220,10,'#000');
    rc(W/2-108,18,216,6,'#511');
    rc(W/2-108,18,216*(boss.hp/boss.maxhp),6,boss.hp<30?'#ff4050':'#f55');
    rc(W/2-108,18,216*(boss.hp/boss.maxhp),1,boss.hp<30?'#ffaabb':'#faa');
    g.fillStyle='#fff';g.font='bold 11px Malgun Gothic';g.textAlign='center';
    g.fillText('◆◆◆ 메탈카드 대마왕 ◆◆◆',W/2,12);
  }

  if(scene==='over'){
    g.fillStyle='rgba(0,0,0,0.75)';g.fillRect(0,0,W,H);
    g.fillStyle='#f55';g.font='bold 34px Malgun Gothic';g.textAlign='center';
    g.fillText('GAME OVER',W/2,115);
    g.fillStyle='#fff';g.font='12px Malgun Gothic';
    g.fillText('서로는 결국 브로콜리를 먹어야 했습니다...',W/2,145);
    g.fillStyle=(t%60<30)?'#ffd93d':'#888';g.font='bold 14px Malgun Gothic';
    g.fillText('[ENTER] 다시하기',W/2,190);
  }
  if(scene==='clear'){
    g.fillStyle='rgba(0,0,20,0.8)';g.fillRect(0,0,W,H);
    for(let i=0;i<40;i++){
      const cx=(i*31+t)%W,cy=(i*17+t*2)%H;
      rc(cx,cy,2,2,['#ffd93d','#f55','#4fc3f7','#5a9a3a'][i%4]);
    }
    g.fillStyle='#ffd93d';g.font='bold 30px Malgun Gothic';g.textAlign='center';
    g.fillText('CHAPTER 1 CLEAR!',W/2,110);
    g.fillStyle='#fff';g.font='12px Malgun Gothic';
    g.fillText('메탈카드 대마왕을 쓰러뜨렸다!',W/2,140);
    g.fillText('서로는 오늘 밥을 안 먹어도 됩니다.',W/2,158);
    g.fillStyle=(t%60<30)?'#ffd93d':'#888';g.font='bold 14px Malgun Gothic';
    g.fillText('[ENTER] 다시하기',W/2,200);
  }
}

function drawSeroTitle(x,y){
  const s=2;
  function r2(dx,dy,w,h,c){rc(x+dx*s,y+dy*s,w*s,h*s,c);}
  r2(3,17,3,5,'#2b3a55');r2(8,17,3,5,'#2b3a55');
  r2(2,10,10,8,'#ffd93d');
  r2(5,9,4,1,'#ffd4a3');
  r2(3,2,8,8,'#ffd4a3');
  r2(2,0,10,3,'#3d2817');
  r2(2,3,2,2,'#3d2817');r2(10,3,2,2,'#3d2817');
  r2(5,5,1,1,'#000');r2(8,5,1,1,'#000');
  r2(6,8,3,1,'#a33');
  r2(1,11,2,5,'#ffd93d');r2(11,11,2,5,'#ffd93d');
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
})();
</script>
